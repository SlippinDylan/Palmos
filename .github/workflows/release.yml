name: Release

on:
  push:
    branches: [main]

# Allow only one release job at a time; never cancel mid-flight.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Release
    # macos-26 is required: the project uses macOS 26 APIs guarded by @available,
    # and Xcode 16.x on macos-15 does not ship the macOS 26 SDK.
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.4
        run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer

      - name: Run DrivePulseCore Tests
        working-directory: Packages/DrivePulseCore
        run: swift test

      - name: Run DrivePulseApp Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace DrivePulse.xcworkspace \
            -scheme DrivePulseApp \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Run DrivePulseSMARTService Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace DrivePulse.xcworkspace \
            -scheme DrivePulseSMARTServiceTests \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      # Read MARKETING_VERSION from Xcode build settings — single source of truth.
      - name: Read version
        id: version
        run: |
          set -euo pipefail

          BUILD_SETTINGS="$(xcodebuild \
            -workspace DrivePulse.xcworkspace \
            -scheme DrivePulseApp \
            -showBuildSettings 2>/dev/null)"
          VERSION="$(
            awk '
              $1 == "MARKETING_VERSION" && $2 == "=" && !found {
                print $3
                found = 1
              }
            ' <<< "$BUILD_SETTINGS"
          )"
          if [[ -z "$VERSION" ]]; then
            echo "Unable to read MARKETING_VERSION from Xcode build settings." >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      # If the tag already exists the version hasn't been bumped — skip release.
      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.version.outputs.tag }} already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Apple Development certificate
        if: steps.check.outputs.exists == 'false'
        env:
          APPLE_DEVELOPMENT_P12_BASE64: ${{ secrets.APPLE_DEVELOPMENT_P12_BASE64 }}
          APPLE_DEVELOPMENT_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPMENT_P12_PASSWORD }}
        run: |
          set -euo pipefail

          : "${APPLE_DEVELOPMENT_P12_BASE64:?Missing APPLE_DEVELOPMENT_P12_BASE64 secret}"
          : "${APPLE_DEVELOPMENT_P12_PASSWORD:?Missing APPLE_DEVELOPMENT_P12_PASSWORD secret}"

          umask 077
          CERTIFICATE_PATH="$RUNNER_TEMP/apple-development.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/drivepulse-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          echo "SIGNING_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          printf '%s' "$APPLE_DEVELOPMENT_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_DEVELOPMENT_P12_PASSWORD" \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          IDENTITY_LINE="$(
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
              | awk '/"Apple Development:/ && !found { print; found = 1 }'
          )"
          if [[ -z "$IDENTITY_LINE" ]]; then
            echo "Unable to find an Apple Development identity in the imported P12." >&2
            exit 1
          fi

          SIGNING_IDENTITY="$(awk '{ print $2 }' <<< "$IDENTITY_LINE")"
          SIGNING_CERTIFICATE_NAME="$(
            sed -E 's/^[^"]*"([^"]+)".*$/\1/' <<< "$IDENTITY_LINE"
          )"
          SIGNING_TEAM_ID="$(
            security find-certificate \
              -c "$SIGNING_CERTIFICATE_NAME" \
              -p \
              "$KEYCHAIN_PATH" \
              | openssl x509 -noout -subject -nameopt RFC2253 \
              | tr ',' '\n' \
              | awk -F= '$1 == "OU" && !found { print $2; found = 1 }'
          )"

          if [[ -z "$SIGNING_IDENTITY" || -z "$SIGNING_TEAM_ID" ]]; then
            echo "Unable to find an Apple Development identity and Team ID in the imported P12." >&2
            exit 1
          fi

          {
            echo "SIGNING_IDENTITY=$SIGNING_IDENTITY"
            echo "SIGNING_TEAM_ID=$SIGNING_TEAM_ID"
          } >> "$GITHUB_ENV"

          rm -f "$CERTIFICATE_PATH"

      - name: Build and sign smartctl companion
        if: steps.check.outputs.exists == 'false'
        run: |
          set -euo pipefail

          COMPANION_OUTPUT_DIRECTORY="$RUNNER_TEMP/smartctl-companion"
          Scripts/build-smartctl-companion.sh "$COMPANION_OUTPUT_DIRECTORY"

          COMPANION_PATH="$COMPANION_OUTPUT_DIRECTORY/smartctl"
          SOURCE_ARCHIVE="$COMPANION_OUTPUT_DIRECTORY/smartmontools-7.5.tar.gz"
          cmp \
            "$COMPANION_OUTPUT_DIRECTORY/smartmontools-COPYING.txt" \
            Shared/Licensing/smartmontools-COPYING.txt

          codesign \
            --force \
            --sign "$SIGNING_IDENTITY" \
            --identifier com.drivepulse.smartservice.smartctl \
            --options runtime \
            --timestamp=none \
            --keychain "$SIGNING_KEYCHAIN_PATH" \
            "$COMPANION_PATH"
          codesign --verify --strict --verbose=2 "$COMPANION_PATH"
          COMPANION_SHA256="$(shasum -a 256 "$COMPANION_PATH" | awk '{ print $1 }')"

          {
            echo "SMARTCTL_COMPANION_PATH=$COMPANION_PATH"
            echo "SMARTCTL_COMPANION_SHA256=$COMPANION_SHA256"
            echo "SMARTMONTOOLS_SOURCE_ARCHIVE=$SOURCE_ARCHIVE"
          } >> "$GITHUB_ENV"

      - name: Build Release
        if: steps.check.outputs.exists == 'false'
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace DrivePulse.xcworkspace \
            -scheme DrivePulseApp \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            DEVELOPMENT_TEAM="$SIGNING_TEAM_ID" \
            TEAM_IDENTIFIER="$SIGNING_TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--keychain $SIGNING_KEYCHAIN_PATH" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            SMARTCTL_COMPANION_PATH="$SMARTCTL_COMPANION_PATH" \
            SMARTCTL_COMPANION_SHA256="$SMARTCTL_COMPANION_SHA256" \
            SMARTCTL_COMPANION_REQUIRED_FOR_SIGNED_BUILD=YES

      - name: Verify Release signatures
        if: steps.check.outputs.exists == 'false'
        run: |
          APP_PATH="$RUNNER_TEMP/DerivedData/Build/Products/Release/DrivePulseApp.app"
          Scripts/verify/code-signing.sh "$APP_PATH" "$SIGNING_TEAM_ID"

      # ditto preserves symlinks and resource forks inside .app bundles.
      - name: Package
        if: steps.check.outputs.exists == 'false'
        id: package
        run: |
          set -euo pipefail

          APP_PATH="$RUNNER_TEMP/DerivedData/Build/Products/Release/DrivePulseApp.app"
          if [[ ! -d "$APP_PATH" ]]; then
            echo "Built app bundle not found at $APP_PATH." >&2
            exit 1
          fi
          ZIP_NAME="DrivePulse-${{ steps.version.outputs.tag }}.zip"
          ditto -c -k --keepParent "$APP_PATH" "$RUNNER_TEMP/$ZIP_NAME"
          echo "zip=$RUNNER_TEMP/$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "DrivePulse ${{ steps.version.outputs.tag }}" \
            --generate-notes \
            "${{ steps.package.outputs.zip }}#${{ steps.package.outputs.name }}" \
            "$SMARTMONTOOLS_SOURCE_ARCHIVE#smartmontools-7.5.tar.gz"

      - name: Remove signing keychain
        if: always()
        run: |
          if [[ -n "${SIGNING_KEYCHAIN_PATH:-}" && -f "$SIGNING_KEYCHAIN_PATH" ]]; then
            security delete-keychain "$SIGNING_KEYCHAIN_PATH" || true
          fi
          rm -f "$RUNNER_TEMP/apple-development.p12"
