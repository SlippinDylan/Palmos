name: Test

on:
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    # macos-26 is required: the project uses macOS 26 APIs guarded by @available,
    # and Xcode 16.x on macos-15 does not ship the macOS 26 SDK.
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin to a specific Xcode to avoid silent breakage on runner image updates.
      - name: Select Xcode 26.4
        run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer

      - name: Validate Local SMART Build Entry Point
        run: |
          bash -n Scripts/build-local-smart-app.sh
          bash -n Scripts/build-smartctl-companion.sh
          bash -n Scripts/verify/code-signing.sh
          bash -n Scripts/verify/code-signing-tests.sh
          bash -n Scripts/verify/local-smart-build-tests.sh
          Scripts/build-local-smart-app.sh --help >/dev/null
          Scripts/verify/code-signing-tests.sh
          Scripts/verify/local-smart-build-tests.sh

      - name: Run PalmosCore Tests
        working-directory: Packages/PalmosCore
        run: swift test

      - name: Run PalmosApp Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace Palmos.xcworkspace \
            -scheme PalmosApp \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Run PalmosSMARTService Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace Palmos.xcworkspace \
            -scheme PalmosSMARTServiceTests \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
